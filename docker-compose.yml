services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-test
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "RootPass123!"
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: mssql-init
    depends_on:
      - mssql
    volumes:
      - ./init:/init
    entrypoint: /bin/bash -c "sleep 20 && /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P 'RootPass123!' -C -i /init/01-init.sql"
    restart: "no"

  ssh:
    build: ./ssh
    container_name: ssh-tunnel-mssql
    restart: unless-stopped
    ports:
      - "2225:2222"

volumes:
  mssql-data: