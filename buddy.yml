- pipeline: test
  refs:
  - refs/heads/master
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  targets:
  - target: proxy-do-mssql
    type: SSH
    name: proxy-do-mssql
    host: 192.168.10.226
    port: 2225
    auth:
      username: tunnel
      password: tunnel
  actions:
  - action: Run MSSQL queries via proxy
    type: MSSQL_CLI
    shell: BASH
    execute_commands:
    - sqlcmd -C -Q "SELECT name FROM sys.tables"
    mssql_version: "2022"
    targets:
    - target: mssql
      type: MSSQL
      name: Local MSSQL
      host: mssql
      port: 1433
      database: devdb
      auth:
        username: testuser
        password: TestPass123!
      proxy: proxy-do-mssql
  - action: Run MSSQL queries directly
    type: MSSQL_CLI
    shell: BASH
    execute_commands:
    - sqlcmd -C -Q "SELECT name FROM sys.tables"
    mssql_version: "2022"
    targets:
    - target: mssql-direct
      type: MSSQL
      name: Direct MSSQL
      host: 192.168.10.226
      port: 1434
      database: devdb
      auth:
        username: testuser
        password: TestPass123!
